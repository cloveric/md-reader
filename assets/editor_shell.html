<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>md-bider · 马得笔</title>
  <style>
    :root {
      --bg: #e7ebf3;
      --toolbar-bg: linear-gradient(180deg, #f8f9fc 0%, #edf1f7 100%);
      --toolbar-border: #ccd4e4;
      --surface: #ffffff;
      --text: #1f2a37;
      --muted: #5a6778;
      --primary: #2c5fcb;
      --primary-hover: #224fae;
      --danger: #b73434;
      --tab-strip-bg: #e4e9f2;
      --tab-bg: #dde4f0;
      --tab-border: #bcc6d8;
      --tab-hover: #edf2fa;
      --tab-active: #ffffff;
      --btn-bg: #f7f9fc;
      --btn-border: #bcc6d8;
      --btn-shadow: 0 1px 0 rgba(255, 255, 255, 0.9) inset;
    }
    html.dark-theme {
      --bg: #1a1b2e;
      --toolbar-bg: linear-gradient(180deg, #252640 0%, #1e1f34 100%);
      --toolbar-border: #3a3b55;
      --surface: #24253a;
      --text: #c8cad8;
      --muted: #7a7d95;
      --primary: #6b8cef;
      --primary-hover: #8ba4f5;
      --danger: #e06070;
      --tab-strip-bg: #1e1f34;
      --tab-bg: #252640;
      --tab-border: #3a3b55;
      --tab-hover: #2e2f4a;
      --tab-active: #24253a;
      --btn-bg: #2a2b44;
      --btn-border: #3a3b55;
      --btn-shadow: 0 1px 0 rgba(255, 255, 255, 0.05) inset;
    }
    html.dark-theme .btn { color: #c0c4d8; }
    html.dark-theme .btn:hover { background: #33345a; border-color: #4a4b6a; }
    html.dark-theme .btn.primary { color: #fff; }
    html.dark-theme .btn.mode.active { background: #33345a; color: #8ba4f5; border-color: #4a4b6a; }
    html.dark-theme .btn.mode:hover { background: #2e2f4a; }
    html.dark-theme .mode-group { background: #1e1f34; border-color: #3a3b55; box-shadow: none; }
    html.dark-theme .path { color: #8a8da5; background: rgba(0,0,0,0.2); border-color: #3a3b55; }
    html.dark-theme .tab { color: #9a9db5; }
    html.dark-theme .tab.active { color: #8ba4f5; }
    html.dark-theme .tab-close:hover { background: #3a3b55; color: #c8cad8; }
    html.dark-theme .lang-wrap { background: rgba(0,0,0,0.2); border-color: #3a3b55; }
    html.dark-theme .lang-label { color: #8a8da5; }
    html.dark-theme .lang-select { background: #2a2b44; color: #c0c4d8; border-color: #3a3b55; }
    html.dark-theme #editorRoot { box-shadow: 0 10px 28px rgba(0,0,0,0.25); }
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
    }
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px 9px;
      border-bottom: 1px solid var(--toolbar-border);
      background: var(--toolbar-bg);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.75) inset;
    }
    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }
    .toolbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .btn {
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: #1f2f45;
      border-radius: 10px;
      padding: 0 14px;
      min-height: 34px;
      font-size: 13px;
      line-height: 1;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--btn-shadow);
      transition: background-color 0.12s ease, border-color 0.12s ease, transform 0.08s ease;
    }
    .btn:hover {
      background: #ffffff;
      border-color: #aebad0;
    }
    .btn:active {
      transform: translateY(1px);
    }
    .btn.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.2) inset;
    }
    .btn.primary:hover {
      background: var(--primary-hover);
    }
    .btn.mode {
      min-width: 90px;
      border-radius: 8px;
      min-height: 30px;
      padding: 0 12px;
      font-weight: 500;
    }
    .mode-group {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid #c7d0df;
      border-radius: 10px;
      padding: 2px;
      background: #eef2f8;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }
    .btn.mode {
      border-color: transparent;
      background: transparent;
      box-shadow: none;
    }
    .btn.mode:hover {
      background: #e3e9f4;
      border-color: transparent;
    }
    .btn.mode.active {
      border-color: #b5c2da;
      color: #1b4ea5;
      background: #ffffff;
      box-shadow: 0 1px 2px rgba(60, 85, 130, 0.1);
    }
    .path {
      color: #51617a;
      font-size: 12px;
      max-width: 36vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 8px;
      border-radius: 8px;
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.65);
      border: 1px solid #d3dbe9;
    }
    .status {
      font-size: 12px;
      color: var(--muted);
      padding: 0 2px;
    }
    .status.error {
      color: var(--danger);
    }
    .lang-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      min-height: 28px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid #d3dbe9;
    }
    .lang-label {
      font-size: 12px;
      color: #51617a;
    }
    .lang-select {
      min-height: 24px;
      border-radius: 6px;
      border: 1px solid #bcc6d8;
      background: #ffffff;
      color: #1f2f45;
      font-size: 12px;
      padding: 0 6px;
      outline: none;
    }
    .lang-select:focus {
      border-color: #6e8bc8;
      box-shadow: 0 0 0 2px rgba(110, 139, 200, 0.2);
    }
    .tabs {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px 0;
      border-bottom: 1px solid var(--toolbar-border);
      background: var(--tab-strip-bg);
      overflow-x: auto;
      white-space: nowrap;
    }
    .tabs:empty {
      padding: 0;
      border-bottom: 0;
    }
    .tab {
      display: inline-flex;
      align-items: center;
      height: 32px;
      max-width: 260px;
      background: var(--tab-bg);
      border: 1px solid var(--tab-border);
      border-bottom: 1px solid var(--toolbar-border);
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      padding: 5px 10px;
      cursor: pointer;
      color: #2a3850;
      user-select: none;
      transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
    }
    .tab:hover {
      background: var(--tab-hover);
    }
    .tab.active {
      background: var(--tab-active);
      border-color: var(--toolbar-border);
      border-bottom-color: var(--tab-active);
      color: #1d4fa5;
      margin-bottom: -1px;
    }
    .tab-title {
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 210px;
      font-size: 12px;
    }
    .tab-close {
      margin-left: 6px;
      border: 0;
      border-radius: 4px;
      width: 16px;
      height: 16px;
      line-height: 14px;
      background: transparent;
      color: #6a788c;
      cursor: pointer;
      font-size: 11px;
      padding: 0;
    }
    .tab-close:hover {
      background: #dbe3f3;
      color: #243246;
    }
    .editor-wrap {
      padding: 10px;
      flex: 1;
      min-height: 0;
    }
    #editorRoot {
      height: 100%;
      border: 1px solid var(--toolbar-border);
      border-radius: 12px;
      background: var(--surface);
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(42, 68, 110, 0.09);
    }

    /* ── Preview action bar: styles applied via JS in patchPreviewActionBar ── */
  </style>
</head>
<body>
    <div id="app">
    <div class="toolbar">
      <div class="toolbar-left">
        <button id="newBtn" class="btn">新建</button>
        <button id="openBtn" class="btn">打开</button>
        <button id="saveBtn" class="btn primary">保存</button>
        <button id="saveAsBtn" class="btn">另存为</button>
        <div class="mode-group">
          <button id="svBtn" class="btn mode">分屏预览 SV</button>
          <button id="irBtn" class="btn mode">即时渲染 IR</button>
          <button id="wysiwygBtn" class="btn mode">所见即所得 WYSIWYG</button>
        </div>
        <label class="lang-wrap" for="langSelect">
          <span id="langLabel" class="lang-label">语言</span>
          <select id="langSelect" class="lang-select">
            <option value="zh-CN">中文</option>
            <option value="en">English</option>
          </select>
        </label>
        <button id="themeBtn" class="btn" style="min-width:auto;padding:0 10px;font-size:15px;">
          <span id="themeIcon">&#9789;</span>
        </button>
      </div>
      <div class="toolbar-right">
        <span id="filePath" class="path">未打开文件</span>
        <span id="status" class="status">准备中...</span>
      </div>
    </div>
    <div id="tabs" class="tabs"></div>
    <div class="editor-wrap">
      <div id="editorRoot"></div>
    </div>
  </div>
  <script>
    let editor = null;
    let currentMode = "ir";
    let readySent = false;
    let engineBooted = false;
    let engineError = "";
    let suppressEditorInput = false;
    let tabSeq = 0;
    let activeTabId = "";

    const tabs = [];
    const untitledIndexPool = new Set();
    const statusEl = document.getElementById("status");
    const pathEl = document.getElementById("filePath");
    const tabsEl = document.getElementById("tabs");
    const langLabelEl = document.getElementById("langLabel");
    const langSelectEl = document.getElementById("langSelect");
    const modeButtons = {
      sv: document.getElementById("svBtn"),
      ir: document.getElementById("irBtn"),
      wysiwyg: document.getElementById("wysiwygBtn"),
    };
    const ENGINE_GLOBAL = String.fromCharCode(77, 100, 66, 105, 100, 101, 114);
    const ENGINE_I18N_GLOBAL = String.fromCharCode(77, 100, 66, 105, 100, 101, 114, 73, 49, 56, 110);
    const ENGINE_ICON_GLOBAL = String.fromCharCode(77, 100, 66, 105, 100, 101, 114, 83, 118, 103, 115);
    const ENGINE_JS_B64 = window.__ENGINE_JS_B64__ || "";
    const ENGINE_CSS_B64 = window.__ENGINE_CSS_B64__ || "";
    const ENGINE_ICON_B64 = window.__ENGINE_ICON_B64__ || "";
    const ENGINE_I18N_B64 = window.__ENGINE_I18N_B64__ || "";
    const APP_LOCALE_KEY = "md-bider.locale";
    const UNTITLED_PREFIX_BY_LOCALE = {
      "zh-CN": "未命名 ",
      en: "Untitled ",
    };
    const UI_TEXT = {
      "zh-CN": {
        language: "语言",
        chinese: "中文",
        english: "English",
        new: "新建",
        open: "打开",
        save: "保存",
        saveAs: "另存为",
        modeSv: "分屏预览",
        modeIr: "即时渲染",
        modeWysiwyg: "所见即所得",
        pathNotOpened: "未打开文件",
        closeTab: "关闭标签",
        closeUnsavedConfirm: "标签“{title}”尚未保存，确定关闭吗？",
        statusPreparing: "准备中...",
        statusSwitchTab: "已切换标签",
        statusCloseTab: "已关闭标签",
        statusEditing: "编辑中",
        statusReady: "就绪",
        statusNewTab: "新建标签",
        statusFileOpened: "文件已打开",
        statusNewFile: "新建文件",
        statusSaved: "保存成功",
        statusModeSwitch: "切换模式: {mode}",
        statusLanguageSwitch: "界面语言: 中文",
        statusEditorLoadError: "编辑引擎未加载: {reason}",
        statusEditorUnavailable: "编辑引擎未加载。",
        statusUnknownError: "未知错误",
        statusGenericError: "发生错误",
        tooltipNew: "新建 (Ctrl+N)",
        tooltipOpen: "打开 (Ctrl+O)",
        tooltipSave: "保存 (Ctrl+S)",
        tooltipSaveAs: "另存为 (Ctrl+Shift+S)",
        tooltipModeSv: "分屏预览",
        tooltipModeIr: "即时渲染",
        tooltipModeWysiwyg: "所见即所得",
        previewDesktop: "桌面视图",
        previewTablet: "平板视图",
        previewMobile: "手机视图",
        previewWechat: "复制到微信公众号",
        themeDark: "深色模式",
        themeLight: "浅色模式",
        statusThemeDark: "已切换到深色主题",
        statusThemeLight: "已切换到浅色主题",
        statusImageUploaded: "图片已上传",
        statusUploadFailed: "上传失败",
      },
      en: {
        language: "Language",
        chinese: "Chinese",
        english: "English",
        new: "New",
        open: "Open",
        save: "Save",
        saveAs: "Save As",
        modeSv: "Split Preview SV",
        modeIr: "Instant Render IR",
        modeWysiwyg: "WYSIWYG",
        pathNotOpened: "No file opened",
        closeTab: "Close tab",
        closeUnsavedConfirm: "Tab \"{title}\" has unsaved changes. Close anyway?",
        statusPreparing: "Preparing...",
        statusSwitchTab: "Switched tab",
        statusCloseTab: "Closed tab",
        statusEditing: "Editing",
        statusReady: "Ready",
        statusNewTab: "New tab",
        statusFileOpened: "File opened",
        statusNewFile: "New file",
        statusSaved: "Saved",
        statusModeSwitch: "Mode switched: {mode}",
        statusLanguageSwitch: "Language: English",
        statusEditorLoadError: "Editor engine not loaded: {reason}",
        statusEditorUnavailable: "Editor engine is unavailable.",
        statusUnknownError: "Unknown error",
        statusGenericError: "An error occurred",
        tooltipNew: "New (Ctrl+N)",
        tooltipOpen: "Open (Ctrl+O)",
        tooltipSave: "Save (Ctrl+S)",
        tooltipSaveAs: "Save As (Ctrl+Shift+S)",
        tooltipModeSv: "Split Preview SV",
        tooltipModeIr: "Instant Render IR",
        tooltipModeWysiwyg: "WYSIWYG",
        previewDesktop: "Desktop view",
        previewTablet: "Tablet view",
        previewMobile: "Mobile view",
        previewWechat: "Copy for WeChat",
        themeDark: "Dark mode",
        themeLight: "Light mode",
        statusThemeDark: "Switched to dark theme",
        statusThemeLight: "Switched to light theme",
        statusImageUploaded: "Image uploaded",
        statusUploadFailed: "Upload failed",
      },
    };

    function normalizeLocale(locale) {
      const raw = String(locale || "").trim().toLowerCase();
      return raw.startsWith("zh") ? "zh-CN" : "en";
    }

    function readStoredLocale() {
      try {
        return window.localStorage.getItem(APP_LOCALE_KEY) || "";
      } catch (_) {
        return "";
      }
    }

    function saveStoredLocale(locale) {
      try {
        window.localStorage.setItem(APP_LOCALE_KEY, locale);
      } catch (_) {
        // ignore storage failures (private mode / policy)
      }
    }

    const storedLocale = readStoredLocale();
    let appLocale = storedLocale ? normalizeLocale(storedLocale) : "en";

    function textTable() {
      return UI_TEXT[appLocale] || UI_TEXT["zh-CN"];
    }

    function untitledPrefix() {
      return UNTITLED_PREFIX_BY_LOCALE[appLocale] || UNTITLED_PREFIX_BY_LOCALE["zh-CN"];
    }

    function t(key, vars = {}) {
      const template = textTable()[key] || key;
      return String(template).replace(/\{(\w+)\}/g, (_all, token) => {
        return Object.prototype.hasOwnProperty.call(vars, token) ? String(vars[token]) : "";
      });
    }

    function hostSend(message) {
      if (window.ipc && typeof window.ipc.postMessage === "function") {
        window.ipc.postMessage(JSON.stringify(message));
      }
    }

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.classList.toggle("error", isError);
    }

    function setPath(path) {
      pathEl.textContent = path || t("pathNotOpened");
      pathEl.title = pathEl.textContent;
    }

    function refreshUntitledTabTitles() {
      const prefix = untitledPrefix();
      tabs.forEach((tab) => {
        if (Number.isInteger(tab.untitledIndex) && tab.untitledIndex > 0) {
          tab.title = `${prefix}${tab.untitledIndex}`;
        }
      });
    }

    function applyUiLanguage() {
      document.documentElement.lang = appLocale;
      document.getElementById("newBtn").textContent = t("new");
      document.getElementById("newBtn").title = t("tooltipNew");
      document.getElementById("openBtn").textContent = t("open");
      document.getElementById("openBtn").title = t("tooltipOpen");
      document.getElementById("saveBtn").textContent = t("save");
      document.getElementById("saveBtn").title = t("tooltipSave");
      document.getElementById("saveAsBtn").textContent = t("saveAs");
      document.getElementById("saveAsBtn").title = t("tooltipSaveAs");
      modeButtons.sv.textContent = t("modeSv");
      modeButtons.sv.title = t("tooltipModeSv");
      modeButtons.ir.textContent = t("modeIr");
      modeButtons.ir.title = t("tooltipModeIr");
      modeButtons.wysiwyg.textContent = t("modeWysiwyg");
      modeButtons.wysiwyg.title = t("tooltipModeWysiwyg");
      langLabelEl.textContent = t("language");
      langSelectEl.options[0].textContent = t("chinese");
      langSelectEl.options[1].textContent = t("english");
      langSelectEl.value = appLocale;
      refreshUntitledTabTitles();
      renderTabs();
      const active = getActiveTab();
      setPath(active?.path || "");
    }

    function setLocale(locale, { announce = true, recreateEditor = true } = {}) {
      const next = normalizeLocale(locale);
      if (next === appLocale) {
        return;
      }
      appLocale = next;
      saveStoredLocale(appLocale);
      applyUiLanguage();
      if (recreateEditor && editor) {
        persistActiveTabContent();
        createEditor(getActiveTab()?.content || "");
      }
      if (announce) {
        setStatus(t("statusLanguageSwitch"));
      }
    }

    function updateModeButtons() {
      Object.entries(modeButtons).forEach(([mode, btn]) => {
        btn.classList.toggle("active", mode === currentMode);
      });
    }

    function decodeBase64Utf8(input) {
      const raw = atob(input);
      const bytes = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i += 1) {
        bytes[i] = raw.charCodeAt(i);
      }
      return new TextDecoder("utf-8").decode(bytes);
    }

    function evalBase64Script(input) {
      if (!input) {
        return;
      }
      const scriptText = decodeBase64Utf8(input);
      (0, eval)(scriptText);
    }

    function ensureEngineLoaded() {
      if (window[ENGINE_GLOBAL]) {
        return true;
      }
      if (engineBooted) {
        return !!window[ENGINE_GLOBAL];
      }

      try {
        if (!ENGINE_JS_B64 || !ENGINE_CSS_B64) {
          engineError = appLocale === "en" ? "embedded assets are missing" : "内嵌资源未注入";
          return false;
        }
        const cssText = decodeBase64Utf8(ENGINE_CSS_B64);
        if (!document.getElementById("engine-style")) {
          const style = document.createElement("style");
          style.id = "engine-style";
          style.textContent = cssText;
          document.head.appendChild(style);
        }

        if (!window[ENGINE_I18N_GLOBAL]) {
          evalBase64Script(ENGINE_I18N_B64);
        }
        if (!window[ENGINE_ICON_GLOBAL]) {
          evalBase64Script(ENGINE_ICON_B64);
        }

        const jsText = decodeBase64Utf8(ENGINE_JS_B64);
        (0, eval)(jsText);
        engineBooted = true;
      } catch (error) {
        engineError = error instanceof Error ? error.message : String(error);
        return false;
      }

      return !!window[ENGINE_GLOBAL];
    }

    function basename(path) {
      if (!path) {
        return "";
      }
      const normalized = String(path).replaceAll("\\", "/");
      const parts = normalized.split("/").filter(Boolean);
      return parts.length > 0 ? parts[parts.length - 1] : "";
    }

    function nextTabId() {
      tabSeq += 1;
      return `tab-${tabSeq}`;
    }

    function syncTabSeqFromId(tabId) {
      const match = /^tab-(\d+)$/.exec(tabId || "");
      if (!match) {
        return;
      }
      const numericId = Number(match[1]);
      if (Number.isFinite(numericId)) {
        tabSeq = Math.max(tabSeq, numericId);
      }
    }

    function parseUntitledIndex(title) {
      const normalizedTitle = String(title || "").trim();
      const prefixes = Object.values(UNTITLED_PREFIX_BY_LOCALE);
      for (const prefix of prefixes) {
        if (!normalizedTitle.startsWith(prefix)) {
          continue;
        }
        const suffix = normalizedTitle.slice(prefix.length).trim();
        if (/^\d+$/.test(suffix)) {
          return Number(suffix);
        }
      }
      return null;
    }

    function acquireUntitledIndex(preferred = null) {
      if (Number.isInteger(preferred) && preferred > 0 && !untitledIndexPool.has(preferred)) {
        untitledIndexPool.add(preferred);
        return preferred;
      }

      let index = 1;
      while (untitledIndexPool.has(index)) {
        index += 1;
      }
      untitledIndexPool.add(index);
      return index;
    }

    function releaseUntitledIndex(index) {
      if (Number.isInteger(index) && index > 0) {
        untitledIndexPool.delete(index);
      }
    }

    function ensureUntitledTitle(tab, preferredTitle = "") {
      const prefix = untitledPrefix();
      if (Number.isInteger(tab.untitledIndex) && tab.untitledIndex > 0) {
        untitledIndexPool.add(tab.untitledIndex);
        tab.title = `${prefix}${tab.untitledIndex}`;
        return;
      }

      const preferredIndex = parseUntitledIndex(preferredTitle) ?? parseUntitledIndex(tab.title);
      const index = acquireUntitledIndex(preferredIndex);
      tab.untitledIndex = index;
      tab.title = `${prefix}${index}`;
    }

    function applyTabPath(tab, path, preferredTitle = "") {
      tab.path = path || "";
      const fileName = basename(tab.path);
      if (fileName) {
        releaseUntitledIndex(tab.untitledIndex);
        tab.untitledIndex = null;
        tab.title = fileName;
        return;
      }
      ensureUntitledTitle(tab, preferredTitle);
    }

    function getActiveTab() {
      return tabs.find((tab) => tab.id === activeTabId) || null;
    }

    function getEditorValue() {
      if (!editor) {
        return "";
      }
      return editor.getValue();
    }

    function persistActiveTabContent() {
      const active = getActiveTab();
      if (!active) {
        return;
      }
      active.content = getEditorValue();
    }

    function renderTabs() {
      tabsEl.innerHTML = "";
      tabs.forEach((tab) => {
        const tabEl = document.createElement("div");
        tabEl.className = `tab${tab.id === activeTabId ? " active" : ""}`;
        tabEl.dataset.tabId = tab.id;

        const titleEl = document.createElement("span");
        titleEl.className = "tab-title";
        const dirtyPrefix = tab.dirty ? "● " : "";
        titleEl.textContent = `${dirtyPrefix}${tab.title}`;
        titleEl.title = tab.path || tab.title;
        tabEl.appendChild(titleEl);

        const closeEl = document.createElement("button");
        closeEl.className = "tab-close";
        closeEl.textContent = "×";
        closeEl.title = t("closeTab");
        closeEl.addEventListener("click", (event) => {
          event.stopPropagation();
          closeTab(tab.id);
        });
        tabEl.appendChild(closeEl);

        tabEl.addEventListener("click", () => activateTab(tab.id));
        tabsEl.appendChild(tabEl);
      });
    }

    function setEditorContent(value) {
      if (!editor) {
        return;
      }
      suppressEditorInput = true;
      editor.setValue(value || "");
      suppressEditorInput = false;
    }

    function activateTab(tabId) {
      if (!tabId || tabId === activeTabId) {
        return;
      }
      persistActiveTabContent();
      activeTabId = tabId;
      const active = getActiveTab();
      renderTabs();
      if (active) {
        setPath(active.path || "");
        setEditorContent(active.content || "");
      }
      setStatus(t("statusSwitchTab"));
    }

    function addTab({ id, path = "", content = "", title = "", activate = true }) {
      syncTabSeqFromId(id);
      const tab = {
        id,
        path: "",
        title: "",
        content,
        dirty: false,
        untitledIndex: null,
      };
      applyTabPath(tab, path, title);
      tabs.push(tab);
      if (activate) {
        activeTabId = id;
      }
      renderTabs();
      if (activate) {
        setPath(path);
        if (editor) {
          setEditorContent(content);
        }
      }
      return tab;
    }

    function ensureOneTab() {
      if (tabs.length > 0) {
        return;
      }
      const tab = addTab({ id: nextTabId(), content: "", activate: true });
      setPath(tab.path);
    }

    function markActiveTabDirty() {
      const active = getActiveTab();
      if (!active) {
        return;
      }
      active.content = getEditorValue();
      active.dirty = true;
      renderTabs();
    }

    function closeTab(tabId) {
      const index = tabs.findIndex((tab) => tab.id === tabId);
      if (index === -1) {
        return;
      }
      const tab = tabs[index];
      if (tab.dirty) {
        const ok = window.confirm(t("closeUnsavedConfirm", { title: tab.title }));
        if (!ok) {
          return;
        }
      }
      releaseUntitledIndex(tab.untitledIndex);

      if (tabs.length === 1) {
        tabs[0] = {
          id: nextTabId(),
          path: "",
          title: "",
          content: "",
          dirty: false,
          untitledIndex: null,
        };
        ensureUntitledTitle(tabs[0], tab.title);
        activeTabId = tabs[0].id;
        renderTabs();
        setPath("");
        setEditorContent("");
        setStatus(t("statusCloseTab"));
        return;
      }

      tabs.splice(index, 1);
      if (activeTabId === tabId) {
        const fallbackIndex = Math.max(0, index - 1);
        activeTabId = tabs[fallbackIndex].id;
      }
      const active = getActiveTab();
      renderTabs();
      if (active) {
        setPath(active.path || "");
        setEditorContent(active.content || "");
      }
      setStatus(t("statusCloseTab"));
    }

    function upsertOpenedTab(tabId, path, content) {
      syncTabSeqFromId(tabId);
      const found = tabs.find((tab) => tab.id === tabId);
      if (found) {
        found.content = content || "";
        applyTabPath(found, path || "", found.title);
        found.dirty = false;
      } else {
        const tab = {
          id: tabId,
          path: "",
          content: content || "",
          title: "",
          dirty: false,
          untitledIndex: null,
        };
        applyTabPath(tab, path || "", "");
        tabs.push(tab);
      }
      activeTabId = tabId;
      renderTabs();
      const active = getActiveTab();
      if (active) {
        setPath(active.path || "");
        setEditorContent(active.content || "");
      }
    }

    let isDarkTheme = false;
    const THEME_KEY = "md-bider.theme";

    function readStoredTheme() {
      try { return window.localStorage.getItem(THEME_KEY) || ""; } catch(_) { return ""; }
    }

    function saveStoredTheme(theme) {
      try { window.localStorage.setItem(THEME_KEY, theme); } catch(_) {}
    }

    function applyTheme(dark, { announce = true, recreate = true } = {}) {
      isDarkTheme = dark;
      document.documentElement.classList.toggle("dark-theme", dark);
      const iconEl = document.getElementById("themeIcon");
      if (iconEl) iconEl.innerHTML = dark ? "&#9788;" : "&#9789;";
      const themeBtn = document.getElementById("themeBtn");
      if (themeBtn) themeBtn.title = dark ? t("themeLight") : t("themeDark");
      saveStoredTheme(dark ? "dark" : "light");
      if (recreate && editor) {
        persistActiveTabContent();
        createEditor(getActiveTab()?.content || "");
      }
      if (announce) setStatus(dark ? t("statusThemeDark") : t("statusThemeLight"));
    }

    function getActiveTabDir() {
      const active = getActiveTab();
      if (!active || !active.path) return null;
      const normalized = String(active.path).replaceAll("\\", "/");
      const lastSlash = normalized.lastIndexOf("/");
      return lastSlash > 0 ? active.path.substring(0, lastSlash) : null;
    }

    function handleImageUpload(files) {
      if (!files || files.length === 0) return null;
      Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = () => {
          const base64 = reader.result.split(",")[1] || "";
          hostSend({
            cmd: "upload_image",
            tab_id: activeTabId,
            name: file.name,
            data: base64,
            dir: getActiveTabDir(),
          });
        };
        reader.readAsDataURL(file);
      });
      return null;
    }

    const PREVIEW_ICONS = {
      desktop: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
      tablet: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>',
      mobile: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M12 18h.01"/></svg>',
    };

    function patchPreviewActionBar() {
      const actionBar = document.querySelector('.mdbider-preview__action');
      if (!actionBar || actionBar.dataset.patched) return;

      // Preserve the engine's mode-specific visibility rules.
      // In SV mode the preview container is already flex; in IR/WYSIWYG it may be hidden.
      const previewEl = actionBar.closest('.mdbider-preview');
      if (previewEl) {
        previewEl.style.flexDirection = 'row';
      }

      // Style the content area to fill remaining space
      const resetEl = previewEl && previewEl.querySelector('.mdbider-reset');
      if (resetEl) {
        resetEl.style.flex = '1';
        resetEl.style.order = '0';
        resetEl.style.minWidth = '0';
      }

      // Style the action bar as a vertical sidebar on the right
      Object.assign(actionBar.style, {
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        gap: '4px',
        padding: '8px 4px',
        textAlign: 'center',
        order: '1',
        borderTop: 'none',
        borderLeft: '1px solid var(--toolbar-border)',
        minWidth: '36px',
        width: 'auto',
        height: 'auto',
      });

      // Replace text buttons with SVG icons
      const buttons = actionBar.querySelectorAll('button');
      const textButtons = [];

      buttons.forEach(btn => {
        if (btn.querySelector('svg')) {
          btn.title = t('previewWechat');
        } else {
          textButtons.push(btn);
        }
      });

      const iconEntries = [
        { key: 'previewDesktop', svg: PREVIEW_ICONS.desktop },
        { key: 'previewTablet', svg: PREVIEW_ICONS.tablet },
        { key: 'previewMobile', svg: PREVIEW_ICONS.mobile },
      ];

      textButtons.forEach((btn, i) => {
        if (i < iconEntries.length) {
          const entry = iconEntries[i];
          btn.innerHTML = entry.svg;
          btn.title = t(entry.key);
        }
      });

      // Style all buttons as icon buttons
      buttons.forEach(btn => {
        Object.assign(btn.style, {
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          margin: '2px 0',
          padding: '6px',
          width: '28px',
          height: '28px',
          cursor: 'pointer',
        });
        const svg = btn.querySelector('svg');
        if (svg) {
          svg.style.width = '16px';
          svg.style.height = '16px';
        }
      });

      actionBar.dataset.patched = 'true';
    }

    function createEditor(value = "") {
      if (!ensureEngineLoaded()) {
        const reason = engineError || t("statusUnknownError");
        setStatus(t("statusEditorLoadError", { reason }), true);
        return;
      }
      const EditorCtor = window[ENGINE_GLOBAL];
      if (!EditorCtor) {
        setStatus(t("statusEditorUnavailable"), true);
        return;
      }

      const container = document.getElementById("editorRoot");
      container.innerHTML = "";
      const editorLang = appLocale === "en" ? "en_US" : "zh_CN";
      const editorI18n = appLocale === "en" ? undefined : window[ENGINE_I18N_GLOBAL];
      const editorTheme = isDarkTheme ? "dark" : "classic";
      const contentTheme = isDarkTheme ? "dark" : "light";
      const baseOptions = {
        mode: currentMode,
        height: "100%",
        value,
        icon: "",
        theme: editorTheme,
        typewriterMode: true,
        outline: {
          enable: true,
          position: "left",
        },
        toolbar: [
          "emoji",
          "headings",
          "bold",
          "italic",
          "strike",
          "|",
          "line",
          "quote",
          "list",
          "ordered-list",
          "check",
          "outdent",
          "indent",
          "|",
          "code",
          "inline-code",
          "link",
          "table",
          "upload",
          "|",
          "undo",
          "redo",
          "|",
          "outline",
          "code-theme",
          "content-theme",
          "|",
          "edit-mode",
          "both",
          "preview",
          "export",
          "fullscreen"
        ],
        toolbarConfig: {
          pin: true,
          hide: false,
        },
        counter: {
          enable: true,
          type: "markdown",
        },
        cache: {
          enable: false,
        },
        comment: {
          enable: true,
        },
        upload: {
          handler: handleImageUpload,
        },
        preview: {
          markdown: {
            toc: true,
            autoSpace: true,
            fixTermTypo: true,
            paragraphBeginningSpace: true,
            footnotes: true,
            mark: true,
          },
          math: {
            engine: "KaTeX",
            inlineDigit: true,
          },
          hljs: {
            lineNumber: true,
          },
          theme: {
            current: contentTheme,
            list: {
              "ant-design": "Ant Design",
              light: "Light",
              dark: "Dark",
              wechat: "WeChat",
            },
          },
        },
        input() {
          if (suppressEditorInput) {
            return;
          }
          markActiveTabDirty();
          setStatus(t("statusEditing"));
        },
        after() {
          updateModeButtons();
          patchPreviewActionBar();
          setTimeout(patchPreviewActionBar, 200);
          if (!readySent) {
            hostSend({ cmd: "app_ready", tab_id: activeTabId || null });
            readySent = true;
          }
          setStatus(t("statusReady"));
        },
      };

      try {
        editor = new EditorCtor("editorRoot", {
          ...baseOptions,
          lang: editorLang,
          i18n: editorI18n,
        });
      } catch (error) {
        if (appLocale === "en") {
          editor = new EditorCtor("editorRoot", {
            ...baseOptions,
            lang: "zh_CN",
            i18n: window[ENGINE_I18N_GLOBAL],
          });
          const reason = error instanceof Error ? error.message : String(error);
          setStatus(`English editor fallback: ${reason}`, true);
          return;
        }
        throw error;
      }
    }

    function switchMode(mode) {
      if (!mode || mode === currentMode) {
        return;
      }
      persistActiveTabContent();
      currentMode = mode;
      createEditor(getActiveTab()?.content || "");
      setStatus(t("statusModeSwitch", { mode: mode.toUpperCase() }));
    }

    function requestOpenFile() {
      hostSend({ cmd: "open_file", tab_id: nextTabId() });
    }

    function requestSave(saveAs) {
      const active = getActiveTab();
      if (!active) {
        return;
      }
      persistActiveTabContent();
      const payload = {
        cmd: saveAs ? "save_as" : "save_file",
        tab_id: active.id,
        path: active.path || null,
        content: active.content || "",
      };
      hostSend(payload);
    }

    function translateHostMessage(message) {
      const source = String(message || "").trim();
      if (!source) {
        return source;
      }
      if (appLocale !== "en") {
        return source;
      }
      if (source === "编辑器已就绪") {
        return "Editor is ready";
      }
      if (source.startsWith("打开失败:")) {
        return `Open failed: ${source.slice("打开失败:".length).trim()}`;
      }
      if (source.startsWith("保存失败:")) {
        return `Save failed: ${source.slice("保存失败:".length).trim()}`;
      }
      if (source.startsWith("无法识别指令:")) {
        return `Unknown command: ${source.slice("无法识别指令:".length).trim()}`;
      }
      return source;
    }

    window.__HOST__ = {
      onMessage(message) {
        if (!message || !message.event) {
          return;
        }
        if (message.event === "file_opened") {
          const tabId = message.tab_id || nextTabId();
          upsertOpenedTab(tabId, message.path || "", message.content || "");
          setStatus(message.path ? t("statusFileOpened") : t("statusNewFile"));
          return;
        }
        if (message.event === "file_saved") {
          const target = tabs.find((tab) => tab.id === message.tab_id);
          if (target) {
            applyTabPath(target, message.path || target.path, target.title);
            target.dirty = false;
          }
          if (message.tab_id === activeTabId) {
            setPath(message.path || target?.path || "");
          }
          renderTabs();
          setStatus(t("statusSaved"));
          return;
        }
        if (message.event === "image_uploaded") {
          if (editor && message.url) {
            const name = message.name || "image";
            editor.insertValue(`![${name}](${message.url})\n`);
            markActiveTabDirty();
            setStatus(t("statusImageUploaded"));
          }
          return;
        }
        if (message.event === "status") {
          const localized = translateHostMessage(message.message || "");
          setStatus(localized);
          return;
        }
        if (message.event === "error") {
          const fallback = t("statusGenericError");
          const localized = translateHostMessage(message.message || fallback);
          setStatus(localized || fallback, true);
        }
      },
    };

    document.getElementById("newBtn").addEventListener("click", () => {
      persistActiveTabContent();
      const tab = addTab({ id: nextTabId(), content: "", activate: true });
      setEditorContent(tab.content);
      setStatus(t("statusNewTab"));
    });
    document.getElementById("openBtn").addEventListener("click", () => {
      requestOpenFile();
    });
    document.getElementById("saveBtn").addEventListener("click", () => {
      requestSave(false);
    });
    document.getElementById("saveAsBtn").addEventListener("click", () => {
      requestSave(true);
    });
    modeButtons.sv.addEventListener("click", () => switchMode("sv"));
    modeButtons.ir.addEventListener("click", () => switchMode("ir"));
    modeButtons.wysiwyg.addEventListener("click", () => switchMode("wysiwyg"));
    langSelectEl.addEventListener("change", (event) => {
      const next = event?.target?.value || "zh-CN";
      setLocale(next, { announce: true, recreateEditor: true });
    });
    document.getElementById("themeBtn").addEventListener("click", () => {
      applyTheme(!isDarkTheme);
    });

    window.addEventListener("keydown", (event) => {
      const hotkey = event.ctrlKey || event.metaKey;
      if (!hotkey) {
        return;
      }
      const key = event.key.toLowerCase();
      if (key === "n") {
        event.preventDefault();
        document.getElementById("newBtn").click();
      } else if (key === "o") {
        event.preventDefault();
        requestOpenFile();
      } else if (key === "w") {
        event.preventDefault();
        closeTab(activeTabId);
      } else if (key === "s" && event.shiftKey) {
        event.preventDefault();
        requestSave(true);
      } else if (key === "s") {
        event.preventDefault();
        requestSave(false);
      }
    });

    applyUiLanguage();
    const storedTheme = readStoredTheme();
    if (storedTheme === "dark") applyTheme(true, { announce: false, recreate: false });
    else applyTheme(false, { announce: false, recreate: false });
    setStatus(t("statusPreparing"));
    ensureOneTab();
    updateModeButtons();
    createEditor(getActiveTab()?.content || "");
  </script>
</body>
</html>
